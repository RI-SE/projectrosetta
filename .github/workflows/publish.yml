name: Publish to PyPI

on:
  release:
    types:
      - published

concurrency:
  group: pypi-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          release_tag = os.environ["RELEASE_TAG"]
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not match package version {version!r}; "
                  f"expected {expected_tag!r}."
              )
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build pip twine

      - name: Build distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/project-rosetta
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
