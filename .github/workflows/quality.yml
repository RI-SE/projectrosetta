name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint and format tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check Python formatting (ruff format)
        run: ruff format --check .

      - name: Lint Python (ruff)
        run: ruff check .

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
